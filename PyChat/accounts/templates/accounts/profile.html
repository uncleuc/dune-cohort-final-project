{% extends "chat/base.html" %}

{% block title %}Profile - PyChat{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <div class="bg-white rounded-lg shadow">
        <div class="p-6 border-b border-gray-200">
            <h2 class="text-3xl font-bold text-gray-900 mb-2">Profile</h2>
            <p class="text-gray-600">Your account details.</p>
        </div>
        
        <div class="p-6">
            <div class="max-w-md">
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">Username</label>
                    <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50" value="{{ profile_user.username }}" readonly>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">Email</label>
                    <input type="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50" value="{{ profile_user.email }}" readonly>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
