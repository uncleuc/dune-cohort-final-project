{% extends "chat/base.html" %}

{% block title %}Settings - PyChat{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <div class="bg-white rounded-lg shadow">
        <div class="p-6 border-b border-gray-200">
            <h2 class="text-3xl font-bold text-gray-900 mb-2">Settings</h2>
            <p class="text-gray-600">Manage your chat preferences.</p>
        </div>
        <div class="p-6">
            {% if messages %}
                <div class="mb-4 space-y-2">
                    {% for message in messages %}
                        <div class="rounded-lg bg-green-50 border border-green-200 text-green-700 px-4 py-3">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
            <form method="post" class="space-y-6">
                {% csrf_token %}
                <div class="grid gap-6 sm:grid-cols-1">
                    <label class="flex items-center gap-3 p-4 rounded-lg border border-gray-200 bg-slate-50">
                        {{ form.email_notifications }}
                        <span>
                            <span class="block text-gray-900 font-semibold">Email notifications</span>
                            <span class="block text-sm text-gray-600">Receive email updates for new messages and friend activity.</span>
                        </span>
                    </label>

                    <label class="flex items-center gap-3 p-4 rounded-lg border border-gray-200 bg-slate-50">
                        {{ form.dark_mode }}
                        <span>
                            <span class="block text-gray-900 font-semibold">Enable dark mode</span>
                            <span class="block text-sm text-gray-600">Switch the chat interface to a darker theme.</span>
                        </span>
                    </label>

                    <label class="flex items-center gap-3 p-4 rounded-lg border border-gray-200 bg-slate-50">
                        {{ form.show_online_status }}
                        <span>
                            <span class="block text-gray-900 font-semibold">Show online status</span>
                            <span class="block text-sm text-gray-600">Allow friends to see when you are active.</span>
                        </span>
                    </label>
                </div>
                <button type="submit" class="mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-6 rounded-lg transition-colors">Save Settings</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
